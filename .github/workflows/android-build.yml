name: Build Android APK

# Roda a cada push na main (ex.: merge de PR) e também sob demanda. O app
# Android existe só para dar à Wishlist um WebView interno de verdade
# (completar itens de lojas que bloqueiam a Edge Function por IP, ex.:
# Mercado Livre) — não faz parte do fluxo normal de deploy do PWA, mas o
# APK deve sempre refletir o estado atual da main.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Carimbar commit da build
        run: echo "APP_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      # A keystore de debug padrão do Android Gradle Plugin (~/.android/debug.keystore)
      # é gerada na hora, com uma chave nova a cada runner — cada build ficaria
      # assinada com uma assinatura diferente. Como o verificador de atualização
      # in-app instala a build nova por cima da instalada, o Android recusa
      # ("App não instalado") sempre que a assinatura muda. Por isso usamos uma
      # keystore de debug fixa (guardada como secret) em todo build, garantindo
      # que a assinatura nunca muda entre versões.
      - name: Restaurar keystore de debug fixa
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore
      - name: DEBUG diagnostico keystore
        run: |
          echo "sha256 do arquivo restaurado:"
          sha256sum ~/.android/debug.keystore
          echo "tamanho em bytes:"
          wc -c ~/.android/debug.keystore
          echo "cert fingerprint (esperado SHA1 33:9D:14:08:51:4E:C8:99:A7:06:23:4D:4C:EB:BD:09:01:4E:D1:8F):"
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey || true
      - run: npm ci
      - run: npm run build
        env:
          # CAPACITOR_BUILD faz o vite.config.ts usar base "/" em vez de
          # "/wishlist/" (do GitHub Pages) — sem isso os assets dão 404 dentro
          # do WebView do app e a tela fica em branco.
          CAPACITOR_BUILD: '1'
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          APP_COMMIT: ${{ env.APP_COMMIT }}
      - run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: DEBUG diagnostico assinatura do APK
        run: |
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner -type f 2>/dev/null | head -1)
          echo "apksigner encontrado em: $APKSIGNER"
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs android/app/build/outputs/apk/debug/app-debug.apk || true
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wishlist-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      # Publica a build no Supabase só quando o ref é main — é essa versão
      # que o verificador de atualização in-app do app vai oferecer aos
      # usuários. Checar só o ref (e não github.event_name == 'push'):
      # merges do bot de auto-merge (auto-merge.yml) usam GITHUB_TOKEN, que
      # o GitHub bloqueia de disparar eventos `push` (proteção anti-loop) —
      # por isso esse workflow é redisparado via workflow_dispatch com
      # ref: 'main' depois de cada merge. Na prática é sempre assim que
      # chegamos na main, então exigir event_name == 'push' faria esse step
      # nunca rodar.
      - name: Publicar versão para atualização in-app
        if: github.ref == 'refs/heads/main'
        run: node scripts/publicar-supabase.mjs
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_COMMIT: ${{ env.APP_COMMIT }}
