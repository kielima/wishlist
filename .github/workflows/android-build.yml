name: Build Android APK

# Roda a cada push na main (ex.: merge de PR) e também sob demanda. O app
# Android existe só para dar à Wishlist um WebView interno de verdade
# (completar itens de lojas que bloqueiam a Edge Function por IP, ex.:
# Mercado Livre) — não faz parte do fluxo normal de deploy do PWA, mas o
# APK deve sempre refletir o estado atual da main.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Carimbar commit da build
        run: echo "APP_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run build
        env:
          # CAPACITOR_BUILD faz o vite.config.ts usar base "/" em vez de
          # "/wishlist/" (do GitHub Pages) — sem isso os assets dão 404 dentro
          # do WebView do app e a tela fica em branco.
          CAPACITOR_BUILD: '1'
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          APP_COMMIT: ${{ env.APP_COMMIT }}
      - run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: wishlist-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      # Publica a build no Supabase só em push na main (não em
      # workflow_dispatch de outro branch) — é essa versão que o
      # verificador de atualização in-app do app vai oferecer aos usuários.
      - name: Publicar versão para atualização in-app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/publicar-supabase.mjs
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_COMMIT: ${{ env.APP_COMMIT }}
