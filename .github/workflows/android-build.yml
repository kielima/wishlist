name: Build Android APK

# Sob demanda: o app Android existe só para dar à Wishlist um WebView interno
# de verdade (completar itens de lojas que bloqueiam a Edge Function por IP,
# ex.: Mercado Livre) — não faz parte do fluxo normal de deploy do PWA.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: wishlist-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
